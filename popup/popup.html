<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SocialPilot</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div id="app">

    <!-- =================== AUTH SCREEN =================== -->
    <section id="auth-screen" class="screen active">
      <div class="auth-wrap">
        <div class="auth-logo">
          <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
            <rect width="40" height="40" rx="10" fill="url(#g1)"/>
            <path d="M12 20L17 25L28 14" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
            <defs><linearGradient id="g1" x1="0" y1="0" x2="40" y2="40"><stop stop-color="#f59e0b"/><stop offset="1" stop-color="#ec4899"/></linearGradient></defs>
          </svg>
        </div>
        <h1 class="auth-title">SocialPilot</h1>
        <p class="auth-sub">Schedule posts across 5 platforms</p>

        <!-- Tabs -->
        <div class="auth-tabs">
          <button class="tab active" data-tab="login">Sign In</button>
          <button class="tab" data-tab="register">Sign Up</button>
        </div>

        <!-- Login Form -->
        <form id="login-form" class="auth-form">
          <div class="field">
            <label>Email</label>
            <input type="email" id="login-email" placeholder="you@example.com" required />
          </div>
          <div class="field">
            <label>Password</label>
            <input type="password" id="login-pass" placeholder="••••••••" required />
          </div>
          <div class="field-row">
            <label class="check"><input type="checkbox" id="login-remember" checked /> Remember me</label>
          </div>
          <button type="submit" class="btn-primary" id="login-btn">Sign In</button>
          <div id="login-error" class="error-msg"></div>
        </form>

        <!-- Register Form -->
        <form id="register-form" class="auth-form hidden">
          <div class="field">
            <label>Full Name</label>
            <input type="text" id="reg-name" placeholder="Jane Doe" required />
          </div>
          <div class="field">
            <label>Email</label>
            <input type="email" id="reg-email" placeholder="you@example.com" required />
          </div>
          <div class="field">
            <label>Password</label>
            <input type="password" id="reg-pass" placeholder="Min 6 characters" required />
          </div>
          <div class="field">
            <label>Confirm Password</label>
            <input type="password" id="reg-confirm" placeholder="Re-enter password" required />
          </div>
          <label class="check" style="margin: 4px 0 12px;">
            <input type="checkbox" id="reg-terms" required /> I agree to the Terms & Privacy Policy
          </label>
          <button type="submit" class="btn-primary" id="reg-btn">Create Account</button>
          <div id="reg-error" class="error-msg"></div>
        </form>

        <p class="auth-footer">By continuing, you agree to our Terms of Service and Privacy Policy.</p>
      </div>
    </section>

    <!-- =================== MAIN SCREEN =================== -->
    <section id="main-screen" class="screen">
      <!-- Header -->
      <header class="header">
        <div class="header-left">
          <div class="avatar" id="user-avatar">U</div>
          <div class="header-info">
            <div class="header-name" id="user-name">User</div>
            <div class="header-plan" id="user-plan">Free Plan</div>
          </div>
        </div>
        <button class="icon-btn" id="btn-open-dash" title="Open Dashboard">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </button>
      </header>

      <!-- Content Area -->
      <main class="main-content" id="main-content">
        <!-- Filled by JS -->
      </main>

      <!-- Bottom Nav -->
      <nav class="bottom-nav" id="bottom-nav">
        <button class="nav-item active" data-page="dashboard" title="Dashboard">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          <span>Home</span>
        </button>
        <button class="nav-item" data-page="schedule" title="Schedule">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <span>Schedule</span>
        </button>
        <button class="nav-item" data-page="create" title="Create Post">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
          <span>Create</span>
        </button>
        <button class="nav-item" data-page="queue" title="Queue">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
          <span>Queue</span>
        </button>
        <button class="nav-item" data-page="settings" title="Settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          <span>Settings</span>
        </button>
      </nav>
    </section>

    <!-- Toast -->
    <div id="toast-box"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
